- name: ensure http package is installed
  dnf: 
    name: httpd
    state: present

- name: ensure http service is enabled and running
  service: 
    name: httpd 
    state: started 
    enabled: yes

- name: enable http service in firewall
  firewalld: 
    service: http 
    permanent: yes 
    state: enabled 
    immediate: true

- name: copy html file to httpd docroot
  copy: 
    src: "{{ item }}"
    dest: /var/www/html/
  with_fileglob: "files/*"

